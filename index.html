<!DOCTYPE html>
<html>
<head>
<title>Welder Test Series</title>
<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:30px;
}
.box{
background:white;
padding:20px;
border-radius:12px;
max-width:400px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}
button{
width:100%;
padding:15px;
margin:10px 0;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
}
.open{
background:green;
color:white;
}
.lock{
background:gray;
color:white;
}
</style>
</head>
<body>

<div class="box">
<h2>Welder Test Series</h2>

<button class="open" onclick="openSet1()">Start Set 1</button>

<button id="set2" class="lock">🔒 Set 2 Locked</button>
<button class="lock">🔒 Set 3 Locked</button>
<button class="lock">🔒 Set 4 Locked</button>
<button class="lock">🔒 Set 5 Locked</button>

</div>

<script>

if(localStorage.getItem("set2")=="open"){
let btn=document.getElementById("set2");
btn.innerHTML="Start Set 2";
btn.className="open";
btn.onclick=function(){
window.location.href="set2.html";
}
}

function openSet1(){
window.location.href="welder-set-3.html";
}

</script>

</body>
</html>
