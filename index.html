<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Welder Test Category</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
min-height:100vh;
padding:20px;
color:white;
}

.container{
max-width:1000px;
margin:auto;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(14px);
padding:30px;
border-radius:24px;
box-shadow:0 0 30px rgba(0,0,0,.4);
}

h1{
text-align:center;
font-size:42px;
color:#facc15;
margin-bottom:10px;
}

.sub{
text-align:center;
font-size:20px;
color:#cbd5e1;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
}

.card{
background:white;
color:#111827;
padding:25px;
border-radius:20px;
text-align:center;
font-size:24px;
font-weight:bold;
cursor:pointer;
transition:.3s;
box-shadow:0 8px 18px rgba(0,0,0,.2);
}

.card:hover{
transform:translateY(-8px) scale(1.03);
background:#dbeafe;
}

.back{
margin-top:30px;
text-align:center;
}

button{
padding:12px 20px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:12px;
cursor:pointer;
background:#2563eb;
color:white;
}

.footer{
text-align:center;
margin-top:30px;
color:#94a3b8;
}

@media(max-width:600px){
h1{font-size:32px;}
.card{font-size:20px;}
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 Welder Test Series</h1>

<div class="sub">
Select your test set and start practice now
</div>

<div class="grid">

<div class="card" onclick="openTest('set1')">Set 1</div>

<div class="card" onclick="openTest('set2')">Set 2</div>

<div class="card" onclick="openTest('set3')">Set 3</div>

<div class="card" onclick="openTest('set4')">Set 4</div>

<div class="card" onclick="openTest('mock')">Mock Test</div>

<div class="card" onclick="openTest('rapid')">Rapid Quiz</div>

</div>

<div class="back">
<button onclick="goHome()">⬅ Back To Home</button>
</div>

<div class="footer">
Premium Welder Practice Portal
</div>

</div>

<script>

function openTest(type){

if(type==="set3"){
window.location.href="welder-set-3.html";
}
else{
alert("Coming Soon...");
}

}

function goHome(){
window.location.href="index.html";
}

</script>

</body>
</html>
