<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:40px;
}

.container{
max-width:400px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:12px;
margin:10px 0;
font-size:16px;
}

button{
padding:12px 25px;
font-size:16px;
background:blue;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

a{
display:block;
margin-top:15px;
}
</style>
</head>

<body>

<div class="container">
<h2>Create Account</h2>

<input type="email" id="email" placeholder="Enter Email">
<input type="password" id="password" placeholder="Enter Password">

<button onclick="register()">Register</button>

<a href="login.html">Already have account? Login</a>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getAuth, createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyAQ4VJL6fe84m9uo5nKDotTO-yR_aWPf4U",
authDomain: "welder-test-series.firebaseapp.com",
projectId: "welder-test-series",
storageBucket: "welder-test-series.firebasestorage.app",
messagingSenderId: "1003844154199",
appId: "1:1003844154199:web:9ba824605feaf423cc8412"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = function(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)
.then(() => {
alert("Registration Successful");
window.location.href="login.html";
})
.catch((error)=>{
alert(error.message);
});

}

</script>

</body>
</html>
