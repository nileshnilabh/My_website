<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyAQ4VJL6fe84m9uo5nKDotTO-yR_aWPf4U",
authDomain: "welder-test-series.firebaseapp.com",
projectId: "welder-test-series",
storageBucket: "welder-test-series.firebasestorage.app",
messagingSenderId: "1003844154199",
appId: "1:1003844154199:web:9ba824605feaf423cc8412"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = function () {

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

createUserWithEmailAndPassword(auth, email, password)
.then((userCredential) => {
alert("Registration Successful");
window.location.href = "login.html";
})
.catch((error) => {
alert(error.message);
});

};

</script>
