<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Test - UPPSC AE 2019</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #e9ecef;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            overflow: hidden;
            margin-bottom: 20px;
        }
        .header {
            background: #34495e;
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .timer {
            background: #e74c3c;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: bold;
        }
        .question-area {
            padding: 20px 24px;
        }
        .question-box {
            margin-bottom: 30px;
        }
        .q-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .option-btn {
            flex: 1 1 45%;
            padding: 10px;
            border: 2px solid #bdc3c7;
            background: white;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }
        .option-btn:hover { border-color: #3498db; }
        .option-btn.selected-correct {
            border-color: #27ae60;
            background: #d4efdf;
            color: #1e7e34;
            font-weight: bold;
        }
        .option-btn.selected-wrong {
            border-color: #e74c3c;
            background: #fadbd8;
            color: #c0392b;
            font-weight: bold;
        }
        .option-btn.show-correct {
            border-color: #27ae60;
            background: #d4efdf;
            color: #1e7e34;
        }
        .feedback {
            margin-top: 8px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .submit-btn, .start-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: #2ecc71;
            color: white;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .submit-btn:hover, .start-btn:hover { background: #27ae60; }
        .submit-btn:disabled { background: #95a5a6; cursor: not-allowed; }
        .score-card {
            padding: 20px 24px;
            background: #f8f9fa;
            border-top: 1px solid #dee2e6;
        }
        .hidden { display: none; }
        .review-block {
            margin-top: 20px;
            border-top: 1px solid #ccc;
            padding-top: 20px;
        }
        .review-item {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 6px;
        }
        .review-correct { background: #d4efdf; border-left: 4px solid #27ae60; }
        .review-wrong { background: #fadbd8; border-left: 4px solid #e74c3c; }
        .review-unattempted { background: #f0f0f0; border-left: 4px solid #95a5a6; }
    </style>
</head>
<body>
    <div class="container" id="startCard">
        <div style="padding:40px; text-align:center">
            <h2>📝 Demo Test - UPPSC AE 2019 (Hindi)</h2>
            <p style="margin:20px 0">5 प्रश्न | 5 मिनट</p>
            <button class="start-btn" onclick="startTest()">Start Test</button>
        </div>
    </div>

    <div class="container hidden" id="testCard">
        <div class="header">
            <span>प्रश्न <span id="currentQ">0</span>/5</span>
            <div class="timer" id="timerDisplay">05:00</div>
        </div>
        <div class="question-area" id="questionContainer"></div>
        <button class="submit-btn" id="submitBtn" onclick="submitTest()">Submit Test</button>
    </div>

    <div class="container hidden" id="resultCard">
        <div class="score-card" id="scoreSection"></div>
        <div class="review-block" id="reviewSection"></div>
    </div>

    <script>
        // ---------- प्रश्न सूची ----------
        const questions = [
            {
                question: "1. इनमें से दन्त्य ध्वनियाँ हैं",
                options: ["A. च, छ, ज, झ", "B. प, फ, ब, भ", "C. त, थ, द, ध", "D. ट, ठ, ड, ढ"],
                answer: 2   // index 2 (C)
            },
            {
                question: "2. इनमें से व्यंजन सन्धि आधारित शब्द है",
                options: ["A. अन्वेषण", "B. उद्धार", "C. लघूर्मि", "D. पुरोहित"],
                answer: 1   // B
            },
            {
                question: "3. “चौराहा” शब्द में समास है",
                options: ["A. तत्पुरुष", "B. बहुव्रीहि", "C. अव्ययीभाव", "D. ह्रिगु"],
                answer: 1   // B
            },
            {
                question: "4. ‘निवृत्ति’ शब्द का विलोम है",
                options: ["A. सदृवृत्ति", "B. सुवृत्ति", "C. प्रवृत्ति", "D. कुवृत्ति"],
                answer: 2   // C
            },
            {
                question: "5. निम्नलिखित में से ‘शारदा’ का पर्यायवाची शब्द है",
                options: ["A. कमला", "B. कौमुदी", "C. वारुणी", "D. गिरा"],
                answer: 2   // C
            }
        ];

        let userAnswers = new Array(questions.length).fill(null); // null = not attempted
        let timerInterval;
        let timeLeft = 300; // 5 minutes in seconds
        let testStarted = false;

        // ---------- Timer ----------
        function updateTimerDisplay() {
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            document.getElementById('timerDisplay').textContent = 
                String(mins).padStart(2, '0') + ":" + String(secs).padStart(2, '0');
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    submitTest(true);
                }
            }, 1000);
        }

        // ---------- रेंडर प्रश्न ----------
        function renderQuestions() {
            let container = document.getElementById('questionContainer');
            container.innerHTML = '';
            questions.forEach((q, index) => {
                let questionHTML = `<div class="question-box" id="qbox${index}">
                    <div class="q-title">${q.question}</div>
                    <div class="options">`;
                q.options.forEach((opt, optIndex) => {
                    questionHTML += `<button class="option-btn" id="btn${index}_${optIndex}" 
                        onclick="selectAnswer(${index}, ${optIndex})">${opt}</button>`;
                });
                questionHTML += `</div><div class="feedback" id="fb${index}"></div></div>`;
                container.innerHTML += questionHTML;
            });
            // अगर पहले से कोई उत्तर सेलेक्टेड हो तो हाइलाइट करें
            userAnswers.forEach((ans, idx) => {
                if (ans !== null) {
                    highlightSelected(idx, ans);
                }
            });
        }

        function selectAnswer(questionIndex, optionIndex) {
            if (!testStarted) return;
            userAnswers[questionIndex] = optionIndex;
            highlightSelected(questionIndex, optionIndex);
        }

        function highlightSelected(questionIndex, optionIndex) {
            // सभी बटन अन-हाइलाइट करें
            const buttons = document.querySelectorAll(`[id^="btn${questionIndex}_"]`);
            buttons.forEach(btn => {
                btn.classList.remove('selected-correct', 'selected-wrong');
            });
            // चयनित बटन को हाइलाइट करें (अभी सही/गलत नहीं, सिर्फ selected)
            const selectedBtn = document.getElementById(`btn${questionIndex}_${optionIndex}`);
            if (selectedBtn) {
                selectedBtn.classList.add('selected-correct'); // temporary visual feedback
                // हम temporary class का उपयोग करेंगे, असली सही/गलत बाद में
            }
        }

        // ---------- सबमिट ----------
        function submitTest(autoSubmit = false) {
            if (!testStarted) return;
            testStarted = false;
            clearInterval(timerInterval);

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = "Submitted";

            // सभी बटन डिसेबल करें
            document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);

            // स्कोर गणना
            let correct = 0, wrong = 0, unattempted = 0;
            questions.forEach((q, i) => {
                const userAns = userAnswers[i];
                const fb = document.getElementById(`fb${i}`);
                if (userAns === null) {
                    unattempted++;
                    fb.textContent = '❌ अनुत्तरित';
                    fb.style.color = '#7f8c8d';
                } else if (userAns === q.answer) {
                    correct++;
                    fb.textContent = '✅ सही';
                    fb.style.color = '#27ae60';
                    // सही बटन को हाइलाइट करें
                    const btn = document.getElementById(`btn${i}_${userAns}`);
                    if (btn) btn.classList.add('selected-correct');
                } else {
                    wrong++;
                    fb.textContent = `❌ गलत (सही: ${q.options[q.answer].charAt(0)})`;
                    fb.style.color = '#e74c3c';
                    // गलत बटन को लाल करें
                    const wrongBtn = document.getElementById(`btn${i}_${userAns}`);
                    if (wrongBtn) wrongBtn.classList.add('selected-wrong');
                    // सही बटन को हरा दिखाएँ
                    const correctBtn = document.getElementById(`btn${i}_${q.answer}`);
                    if (correctBtn) correctBtn.classList.add('show-correct');
                }
            });

            // परिणाम दिखाएँ
            document.getElementById('testCard').classList.add('hidden');
            const resultCard = document.getElementById('resultCard');
            resultCard.classList.remove('hidden');
            document.getElementById('scoreSection').innerHTML = `
                <h2>📊 आपका स्कोर</h2>
                <p>✅ सही: <strong>${correct}</strong></p>
                <p>❌ गलत: <strong>${wrong}</strong></p>
                <p>⚪ छोड़े गए: <strong>${unattempted}</strong></p>
                <p>📈 प्रतिशत: <strong>${((correct / questions.length) * 100).toFixed(1)}%</strong></p>
            `;

            // रिव्यू
            let reviewHTML = '<h3>📋 रिव्यू</h3>';
            questions.forEach((q, i) => {
                let statusClass = '';
                let statusIcon = '';
                const userAns = userAnswers[i];
                if (userAns === null) {
                    statusClass = 'review-unattempted';
                    statusIcon = '⚪';
                } else if (userAns === q.answer) {
                    statusClass = 'review-correct';
                    statusIcon = '✅';
                } else {
                    statusClass = 'review-wrong';
                    statusIcon = '❌';
                }
                reviewHTML += `<div class="review-item ${statusClass}">
                    <strong>${statusIcon} Q${i+1}.</strong> ${q.question}<br>
                    <small>आपका उत्तर: ${userAns !== null ? q.options[userAns] : 'कोई नहीं'} | सही उत्तर: ${q.options[q.answer]}</small>
                </div>`;
            });
            document.getElementById('reviewSection').innerHTML = reviewHTML;

            if (autoSubmit) {
                alert("समय समाप्त! टेस्ट ऑटो-सबमिट हो गया।");
            }
        }

        function startTest() {
            testStarted = true;
            document.getElementById('startCard').classList.add('hidden');
            document.getElementById('testCard').classList.remove('hidden');
            renderQuestions();
            updateTimerDisplay();
            startTimer();
        }
    </script>
</body>
  </html>
