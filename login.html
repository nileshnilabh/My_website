<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welder Test Login</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:15px;
width:90%;
max-width:400px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
color:#222;
}

input{
width:92%;
padding:12px;
margin:10px 0;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
font-size:17px;
background:green;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#008000;
}

a{
display:block;
margin-top:15px;
text-decoration:none;
color:blue;
font-size:15px;
}
</style>
</head>

<body>

<div class="box">

<h2>Welder Test Login</h2>

<input type="email" id="email" placeholder="Enter Email">
<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

<a href="register.html">New User? Register</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getAuth, signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyAQ4VJL6fe84m9uo5nKDotTO-yR_aWPf4U",
authDomain: "welder-test-series.firebaseapp.com",
projectId: "welder-test-series",
storageBucket: "welder-test-series.firebasestorage.app",
messagingSenderId: "1003844154199",
appId: "1:1003844154199:web:9ba824605feaf423cc8412"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)

.then(() => {
alert("Login Successful");
window.location.href="welder-set-3.html";
})

.catch((error) => {
alert(error.message);
});

}

</script>

</body>
</html>
