<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Welder Test Series PRO - Set 3</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
padding:15px;
color:#fff;
}

.container{
max-width:900px;
margin:auto;
background:#ffffff10;
backdrop-filter:blur(10px);
padding:20px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.3);
}

h1{
text-align:center;
margin-bottom:20px;
font-size:28px;
color:#ffd700;
}

.topbar{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
font-size:18px;
font-weight:bold;
}

#timer{
color:#ff4d4d;
font-size:22px;
}

.question-box{
background:#ffffff15;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

#questionNumber{
font-size:18px;
margin-bottom:10px;
color:#ffd700;
}

#question{
font-size:22px;
margin-bottom:20px;
font-weight:bold;
line-height:1.5;
}

.option{
background:#fff;
color:#000;
padding:14px;
margin:10px 0;
border-radius:10px;
cursor:pointer;
transition:.3s;
font-size:18px;
border:2px solid transparent;
}

.option:hover{
background:#dbeafe;
}

.option.selected{
background:#0d6efd;
color:#fff;
border-color:#fff;
transform:scale(1.02);
}

.buttons{
display:flex;
justify-content:space-between;
gap:10px;
flex-wrap:wrap;
margin-top:20px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

.prev{background:#6c757d;color:#fff;}
.next{background:#198754;color:#fff;}
.submit{background:#dc3545;color:#fff;}

button:hover{
opacity:.9;
}

#result{
display:none;
text-align:center;
padding:20px;
}

#result h2{
font-size:32px;
color:#ffd700;
margin-bottom:20px;
}

.score{
font-size:24px;
margin:10px 0;
}

.restart{
background:#0d6efd;
color:#fff;
margin-top:20px;
}

@media(max-width:600px){
#question{font-size:18px;}
.option{font-size:16px;}
button{width:100%;}
}
</style>
</head>

<body>

<div class="container">

<h1>Welder Test Series PRO</h1>

<div class="topbar">
<div>Total Questions: 75</div>
<div id="timer">75:00</div>
</div>

<div id="quizArea">

<div class="question-box">
<div id="questionNumber"></div>
<div id="question"></div>
<div id="options"></div>
</div>

<div class="buttons">
<button class="prev" onclick="prevQuestion()">Previous</button>
<button class="next" onclick="nextQuestion()">Next</button>
<button class="submit" id="submitBtn" onclick="submitTest()" style="display:none;">Submit Test</button>
</div>

</div>

<div id="result"></div>

</div>

<script>

const questions = [];

for(let i=1;i<=75;i++){
questions.push({
q:"Welder MCQ Question No. "+i,
options:[
"Option A",
"Option B",
"Option C",
"Option D"
],
answer:Math.floor(Math.random()*4)
});
}

let current = 0;
let answers = new Array(75).fill(null);

function loadQuestion(){

document.getElementById("questionNumber").innerHTML =
"Question "+(current+1)+" of 75";

document.getElementById("question").innerHTML =
questions[current].q;

let html="";

questions[current].options.forEach((opt,index)=>{

html+=`
<div class="option ${answers[current]===index?'selected':''}"
onclick="selectOption(${index})">
${String.fromCharCode(65+index)}. ${opt}
</div>
`;

});

document.getElementById("options").innerHTML = html;

if(current===74){
document.getElementById("submitBtn").style.display="block";
}else{
document.getElementById("submitBtn").style.display="none";
}
}

function selectOption(index){
answers[current]=index;
loadQuestion();
}

function nextQuestion(){
if(current<74){
current++;
loadQuestion();
}
}

function prevQuestion(){
if(current>0){
current--;
loadQuestion();
}
}

function submitTest(){

let score=0;

for(let i=0;i<75;i++){
if(answers[i]===questions[i].answer){
score++;
}
}

let wrong = answers.filter((a,i)=>a!==null && a!==questions[i].answer).length;
let skipped = answers.filter(a=>a===null).length;
let percent = ((score/75)*100).toFixed(2);

document.getElementById("quizArea").style.display="none";

document.querySelector(".buttons").style.display="none";

document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=`

<h2>Test Submitted ✅</h2>

<div class="score">Correct: ${score}</div>
<div class="score">Wrong: ${wrong}</div>
<div class="score">Skipped: ${skipped}</div>
<div class="score">Percentage: ${percent}%</div>

<button class="restart" onclick="location.reload()">Restart Test</button>

`;
clearInterval(timer);
}

let totalTime = 75*60;

const timer = setInterval(()=>{

let min = Math.floor(totalTime/60);
let sec = totalTime%60;

document.getElementById("timer").innerHTML =
String(min).padStart(2,'0')+":"+
String(sec).padStart(2,'0');

totalTime--;

if(totalTime<0){
submitTest();
}

},1000);

loadQuestion();

</script>

</body>
</html>
