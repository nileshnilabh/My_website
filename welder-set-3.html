let current=0;
let ans=new Array(75).fill(null);

function loadQ(){
document.getElementById("qno").innerHTML="Question "+(current+1)+" / 75";
document.getElementById("question").innerHTML=questions[current].q;

let html="";
questions[current].o.forEach((x,i)=>{
html+=`<div class="option ${ans[current]===i?'selected':''}" onclick="selectAns(${i})">${String.fromCharCode(65+i)}. ${x}</div>`;
});
document.getElementById("options").innerHTML=html;

document.getElementById("submitBtn").style.display=(current===74)?"block":"none";
}

function selectAns(i){
ans[current]=i;
loadQ();
}

function nextQ(){
if(current<74){current++;loadQ();}
}

function prevQ(){
if(current>0){current--;loadQ();}
}

function submitTest(){

let score=0,wrong=0,skip=0;

for(let i=0;i<75;i++){
if(ans[i]===null) skip++;
else if(ans[i]===questions[i].a) score++;
else wrong++;
}

let percent=((score/75)*100).toFixed(2);

document.getElementById("quizArea").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=`
<h2>✅ Test Submitted</h2>
<div class="score">Correct / सही: ${score}</div>
<div class="score">Wrong / गलत: ${wrong}</div>
<div class="score">Skipped / छोड़ा: ${skip}</div>
<div class="score">Percentage / प्रतिशत: ${percent}%</div>
<button onclick="location.reload()">Restart Test</button>
`;
localStorage.setItem("set2","open");
clearInterval(timer);
}

let t=75*60;

const timer=setInterval(()=>{
let m=Math.floor(t/60);
let s=t%60;
document.getElementById("timer").innerHTML=
String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');

t--;

if(t<0) submitTest();

},1000);

loadQ();

</script>
